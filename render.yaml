services:
  # Backend FastAPI Web Service
  - type: web
    name: prioritize-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
        # Note: Set this value to your free Neon/Supabase PostgreSQL connection string
        # You can also change this value in the Render dashboard after creating the service.
        value: postgresql://change_me_to_your_database_url
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: PYTHON_VERSION
        value: 3.12.2

  # Frontend Static React App
  - type: web
    name: prioritize-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://prioritize-backend.onrender.com/api
